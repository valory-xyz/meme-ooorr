; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Most runtime deps auto-mirror from [project].dependencies. Listed here
; are range-form overrides for runtime deps where the package YAML uses
; a range expression — `aea-helpers check-dependencies` does
; string-strict matching so the form must agree on both sides. Plus
; lint-only werkzeug/attrs not in pyproject.
extra_deps =
    protobuf<6,>=5
    aiohttp<4.0.0,>=3.8.5
    py-ecc<10,>=8
    websocket_client<1,>=0.32.0
    prometheus_client>=0.23.1,<0.24
    pebble>=5.1,<6
    pyyaml<7.0.0,>=6.0.0
    werkzeug==3.1.6
    attrs==25.4.0
    pytest-asyncio>=1.3
    ecdsa>=0.15
    certifi
    multidict
    typing_extensions<=4.15.0,>=3.10.0.2
    eth_typing

[pytest]
; Opt in to tomte's canonical pytest defaults (integration/e2e markers,
; aea.* DeprecationWarning filter). Plugin is silent without this flag so
; non-fleet `tomte[black]` consumers don't get unexpected config injection.
tomte_defaults = true
; anchorpy 0.20.2 (pulled transitively via open-aea-ledger-solana since
; open-autonomy 0.21.20) ships a pytest plugin with a broken import that
; crashes pytest collection. Disable its pytest11 entry point.
addopts = -p no:pytest_anchorpy

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; agent-db / twikit / tweepy test suites under the P0–P4 resilience
; PRs (#61–#63) landed on `main` without the slim canonical's
; `--disallow-untyped-defs` enforcement (main's CI still runs the
; legacy hand-written `tox.ini`). Retrofitting type hints across the
; merged-in tests is out of scope for this dep-bump PR — tracked as a
; follow-up.
[mypy-packages.valory.skills.agent_db_abci.tests.*]
ignore_errors = True

[mypy-packages.valory.connections.twikit.tests.*]
ignore_errors = True

[mypy-packages.valory.connections.tweepy.tests.*]
ignore_errors = True

