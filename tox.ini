    {[commands-base]commands}
    pytest -rfE {env:CONTRACTS_PATHS}/service_registry/tests --cov={env:CONTRACTS_PATHS}/service_registry --cov-report=xml --cov-report=term --cov-report=term-missing --cov-config=.coveragerc {posargs}
