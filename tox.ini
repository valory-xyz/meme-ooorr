    pytest -rfE {env:CONNECTIONS_PATHS}/mirror_db/tests --cov={env:CONNECTIONS_PATHS}/mirror_db --cov-report=xml --cov-report=term --cov-report=term-missing --cov-config=.coveragerc {posargs}
    pytest -rfE {env:CONNECTIONS_PATHS}/tweepy/tests --cov={env:CONNECTIONS_PATHS}/tweepy --cov-report=xml --cov-report=term --cov-report=term-missing --cov-config=.coveragerc {posargs}
