[testenv]
basepython = python3
allowlist_externals = /bin/sh
passenv = *
deps = {[deps-packages]deps}
setenv =
    PYTHONHASHSEED=0
    PYTHONPATH={toxinidir}
    PACKAGES_PATHS = packages/dvilela
    SKILLS_PATHS = {env:PACKAGES_PATHS}/skills
    CONTRACTS_PATHS = {env:PACKAGES_PATHS}/contracts
    PROTOCOLS_PATHS = {env:PACKAGES_PATHS}/protocols
    CONNECTIONS_PATHS = {env:PACKAGES_PATHS}/connections
    SERVICE_SPECIFIC_PACKAGES = {env:CONTRACTS_PATHS}/service_registry {env:CONTRACTS_PATHS}/meme_factory {env:CONNECTIONS_PATHS}/twikit {env:CONNECTIONS_PATHS}/mirror_db {env:CONNECTIONS_PATHS}/tweepy {env:SKILLS_PATHS}/memeooorr_abci {env:SKILLS_PATHS}/memeooorr_chained_abci packages/valory/skills/agent_db_abci packages/valory/skills/agent_performance_summary_abci

commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync --all
    pytest -rfE --doctest-modules tests/ --cov=packages --cov-report=xml --cov-report=term --cov-report=term-missing --cov-config=.coveragerc {posargs}

[commands-base]
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync --all

[commands-packages]
commands =
    {[commands-base]commands}
    pytest -rfE {env:CONTRACTS_PATHS}/service_registry/tests {posargs}
    pytest -rfE {env:CONTRACTS_PATHS}/meme_factory/tests {posargs}
    pytest -rfE {env:CONNECTIONS_PATHS}/twikit/tests {posargs}
    pytest -rfE {env:CONNECTIONS_PATHS}/mirror_db/tests {posargs}
